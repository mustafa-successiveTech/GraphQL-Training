type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post!]!
  comments: [Comment!]!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]!
  date: String!
}

type Comment {
  id: ID!
  text: String!
  author: User!
  post: Post!
}

type Error {
  message: String!
  code: String!
}

type PaginatedPosts {
  posts: [Post!]!
  totalCount: Int!
}
