type Query {
  getUser(id: ID!): User
  getAllUsers: [User!]!
  getPost(id: ID!): Post
  getAllPosts: [Post!]!
  getComment(id: ID!): Comment
  getAllComments: [Comment!]!
}

type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post!]!        
  comments: [Comment!]!  
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!          
  comments: [Comment!]!  
}

type Comment {
  id: ID!
  text: String!
  author: User!          
  post: Post!            
}

