type User {
  id: ID!
  name: String!
  email: String!
  password: String
  posts: [Post!]!
  comments: [Comment!]!
  token: String
  isOnline: String
}

type Userr {
  id: ID!
  name: String!
  email: String!
  password: String!
  token: String!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]!
  date: String!
}

type Comment {
  id: ID!
  text: String!
  authorId: ID!
  postId: ID!
}

type Error {
  message: String!
  code: String!
}

type PaginatedPosts {
  posts: [Post!]!
  totalCount: Int!
}

type Message {
  id: ID!
  content: String!
  senderId: ID!
  senderName: String!
  createdAt: String!
}

type PresenceUpdate {
  userId: ID!
  name: String!
  isOnline: String!
}
